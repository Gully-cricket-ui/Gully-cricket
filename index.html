    <style>
        :root {

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-white); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; overflow-x: hidden; }

        .signature-box { text-align: center; margin-bottom: 15px; padding: 10px; border-bottom: 3px solid var(--accent-green); background: rgba(3, 192, 122, 0.05); border-radius: 12px; position: relative; }
        .signature-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 22px; text-transform: uppercase; color: var(--text-white); }
        .signature-author { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 12px; letter-spacing: 3px; color: var(--accent-green); margin-top: 3px; }

        .mute-toggle { position: absolute; top: 12px; right: 15px; cursor: pointer; font-size: 18px; color: var(--text-grey); transition: color 0.2s; }
        .mute-toggle:hover { color: var(--accent-gold); }

        .hidden { display: none !important; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 13px; color: var(--text-grey); text-transform: uppercase; }
        input, select, textarea { width: 100%; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 12px; border-radius: 8px; font-size: 15px; }
        
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: 700; text-transform: uppercase; font-size: 14px; cursor: pointer; transition: all 0.2s ease; }
        button:hover { filter: brightness(1.1); }
        .btn-primary { background-color: var(--accent-green); color: white; }
        .btn-danger { background-color: var(--danger-red); color: white; }
        .btn-gold { background-color: var(--accent-gold); color: black; }
        .btn-secondary { background: #334155; color: white; }
        .disabled { opacity: 0.15 !important; cursor: not-allowed !important; pointer-events: none !important; }
        
        .crex-panel { background-color: var(--crex-navy); border-radius: 14px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .crex-top-row { display: flex; justify-content: space-between; align-items: center; }
        .crex-team-label { font-size: 20px; font-weight: 700; color: #fff; font-family: 'Montserrat', sans-serif; }
        .crex-live-runs { font-size: 32px; font-weight: 800; color: var(--accent-green); font-family: 'Montserrat', sans-serif; }
        .crex-live-overs { font-size: 14px; color: var(--text-grey); margin-left: 6px; font-family: 'Azeret Mono', monospace; }
        
        .crex-rates-bar { display: flex; justify-content: space-between; font-size: 13px; color: #b3c5ef; background: rgba(255,255,255,0.04); padding: 8px 12px; border-radius: 6px; margin-top: 10px; font-family: 'Azeret Mono', monospace; }
        .crex-gold-banner { background-color: var(--gold-banner); color: var(--gold-text); font-weight: 700; font-size: 14px; text-align: center; padding: 10px; border-radius: 8px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }

        .timeline-container { display: flex; align-items: center; justify-content: center; background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 30px; margin: 10px 0; gap: 6px; }
        .timeline-label { font-size: 12px; font-weight: 700; color: var(--text-white); }
        .ball-circle { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: #ffffff; border: 1px solid #cbd5e1; font-size: 12px; font-weight: bold; color: #0f172a; font-family: 'Azeret Mono', monospace; }
        .ball-circle.wicket { background: var(--danger-red); border-color: var(--danger-red); color: white; }
        .ball-circle.boundary { background: #ffffff; border-color: var(--accent-gold); color: #0f172a; box-shadow: 0 0 6px var(--accent-gold); }
        .ball-circle.extra { background: #475569; color: white; }

        .stats-card { background: #152238; border-radius: 12px; padding: 12px; margin-bottom: 12px; }
        .stats-table { width: 100%; border-collapse: collapse; text-align: left; }
        .stats-table th { color: var(--text-grey); font-size: 11px; font-weight: 600; padding: 6px 4px; border-bottom: 1px solid rgba(255,255,255,0.08); text-transform: uppercase; }
        .stats-table td { padding: 10px 4px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); color: #fff; }
        .on-strike-row { color: var(--accent-green) !important; font-weight: 700; }

        .coin-area { display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 15px 0; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px dashed rgba(255,255,255,0.1); }
        .visual-coin { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #f59e0b, #d97706); color: #0f172a; font-family: 'Montserrat'; font-weight: 800; display: flex; align-items: center; justify-content: center; font-size: 14px; border: 3px double #fff; transition: transform 0.1s ease; margin-bottom: 10px; }
        .coin-spinning { animation: spinFast 0.1s infinite linear; }
        @keyframes spinFast { 0% { transform: rotateX(0deg); } 100% { transform: rotateX(360deg); } }

        .grid-buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 15px; margin-top: 15px; }
        .grid-extras { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .grid-buttons button, .grid-extras button { padding: 12px; font-size: 13px; }

        .modal-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #0f172a; border-radius: 24px; display: flex; flex-direction: column; justify-content: center; padding: 25px; z-index: 999; }
        .boundary-popup { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%) scale(0.5); padding: 15px 35px; border-radius: 12px; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 32px; text-align: center; z-index: 1000; opacity: 0; pointer-events: none; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .boundary-popup.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        .boundary-popup.four { background: linear-gradient(135deg, #eab308, #f59e0b); color: #000; }
        .boundary-popup.six { background: linear-gradient(135deg, #10b981, #059669); color: #fff; }

        .qr-broadcast-wrapper { background: #fff; border-radius: 14px; padding: 12px; text-align: center; margin-top: 15px; border: 2px solid var(--accent-gold); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .qr-title { color: #0f172a; font-size: 12px; font-weight: 800; margin-bottom: 6px; }
        #qrcode-canvas { padding: 5px; background: white; min-height: 160px; min-width: 160px; display: inline-block; }
    </style>
</head>
<body>

<div class="container">
    <div class="signature-box">
        <div class="signature-title">Gully Cricket Pro</div>
        <div class="signature-author">DESIGNED BY ABHIRAM</div>
        <div id="mute-icon" class="mute-toggle" onclick="toggleMute()">

    <div id="setup-screen">
        <div class="form-group"><label>Match Configuration Mode</label><select id="match-mode" onchange="toggleMatchMode()"><option value="team">Team vs Team Match</option><option value="1v1">1 vs 1 Individual Match</option></select></div>
        
        <div id="team-mode-fields">
            <div class="form-group"><label>Batting Team Name (Team A)</label><input type="text" id="teamA-name" value="CG"></div>
            <div class="form-group"><label>Team A Player Lineup (Commas)</label><textarea id="teamA-players" rows="2" placeholder="Shubham Sharma, Rohit Kumar Gupta, T Singh"></textarea></div>
            <div class="form-group"><label>Bowling Team Name (Team B)</label><input type="text" id="teamB-name" value="BL"></div>
            <div class="form-group"><label>Team B Player Lineup (Commas)</label><textarea id="teamB-players" rows="2" placeholder="Pawan Nirwani, Player 2"></textarea></div>
        </div>
        
        <div id="one-on-one-fields" class="hidden">
            <div class="form-group"><label>Player 1 Name</label><input type="text" id="p1-name" value="Player 1"></div>
            <div class="form-group"><label>Player 2 Name</label><input type="text" id="p2-name" value="Player 2"></div>
        </div>

        <div class="coin-area">
            <div class="visual-coin" id="coin-element">COIN</div>
            <div style="display: flex; gap: 10px; width: 100%;">
                <select id="coin-call-select" style="margin:0;"><option value="Heads">Heads</option><option value="Tails">Tails</option></select>
                <button class="btn-gold" style="padding:10px; font-size:12px;" onclick="executeCoinFlip()">Flip Coin</button>
            </div>
            <span id="toss-live-status" style="margin-top: 6px; font-size: 13px; color: var(--accent-green); font-weight: bold;"></span>
        </div>

        <div class="form-group">
            <label>Who won the toss?</label>
            <select id="toss-winner-select"><option value="A">Team A / Player 1</option><option value="B">Team B / Player 2</option></select>
        </div>
        <div class="form-group">
            <label>Toss Choice Decision</label>
            <select id="toss-decision"><option value="Bat">Batting First</option><option value="Bowl">Bowling First</option></select>
        </div>

        <div class="form-group"><label>Total Match Overs</label><input type="number" id="match-overs" value="20" min="1"></div>
        <button class="btn-primary" onclick="startMatch()">Start Scoring</button>
    </div>

    <div id="openers-screen" class="modal-overlay hidden">
        <h2 style="font-size: 20px; text-align: center; margin-bottom: 15px; color: var(--accent-gold); font-family: 'Montserrat';">🏏 Configuration Setup</h2>
        <p style="text-align: center; margin-bottom: 20px; color: var(--text-white); font-size: 14px;" id="openers-team-title"></p>
        <div class="form-group"><label>Striker Batsman</label><select id="select-striker"></select></div>
        <div class="form-group"><label>Non-Striker Batsman</label><select id="select-non-striker"></select></div>
        <div class="form-group" id="bowler-selection-row"><label>Active Over Bowler</label><select id="select-bowler"></select></div>
        <button class="btn-primary" style="margin-top: 10px;" onclick="confirmOpeners()">Confirm Lineup</button>
    </div>

    <div id="match-screen" class="hidden">
        <div class="crex-panel">
            <div class="crex-top-row">
                <div class="crex-team-label" id="batting-team-display">CG</div>
                <div>
                    <span class="crex-node-wrap"><span class="crex-live-runs" id="dsp-runs">0</span><span class="crex-live-runs" style="font-size:28px;">-</span><span class="crex-live-runs" id="dsp-wickets">0</span></span>
                    <span class="crex-live-overs" id="dsp-overs">0.0</span>
                </div>
            </div>
            <div class="crex-rates-bar">
                <div>CRR: <span id="live-crr" style="color:#fff; font-weight:bold;">0.00</span></div>
                <div id="live-rrr-hdr">RRR: <span id="live-rrr" style="color:#fff; font-weight:bold;">0.00</span></div>
                <div>Target: <span id="live-target-val" style="color:#fff; font-weight:bold;">-</span></div>
            </div>
        </div>

        <div class="crex-gold-banner" id="live-equation-banner">MATCH STARTED</div>

        <div class="timeline-container">
            <span class="timeline-label" id="timeline-over-num">Over 1</span>
            <div id="timeline-balls-row" style="display: flex; gap: 6px;"></div>
            <span class="timeline-label" id="timeline-over-total">= 0</span>
        </div>

        <div class="stats-card"><table class="stats-table"><thead><tr><th>Batter</th><th>R (B)</th><th>4s</th><th>6s</th><th>SR</th></tr></thead><tbody id="batsmen-stats-body"></tbody></table></div>
        <div class="stats-card"><table class="stats-table"><thead><tr><th>Bowler</th><th>W-R</th><th>Overs</th><th>Econ</th></tr></thead><tbody id="bowler-stats-body"></tbody></table></div>

        <div id="interactive-button-deck">
            <div class="grid-buttons">
                <button class="btn-secondary score-btn" onclick="addRuns(0)">0</button>
                <button class="btn-primary score-btn" onclick="addRuns(1)">1</button>
                <button class="btn-primary score-btn" onclick="addRuns(2)">2</button>
                <button class="btn-primary score-btn" onclick="addRuns(3)">3</button>
                <button class="btn-primary score-btn" onclick="addRuns(4)">4</button>
                <button class="btn-primary score-btn" onclick="addRuns(6)">6</button>
                <button class="btn-secondary score-btn" onclick="addRuns(0)">Dot</button>
                <button id="btn-manual-swap" class="btn-gold score-btn" onclick="swapStrike()">Swap</button>
                <button class="btn-danger score-btn" style="grid-column: span 4;" onclick="takeWicketMenu()">WICKET</button>
            </div>
            <div class="grid-extras">
                <button class="btn-secondary score-btn" onclick="addExtra('WD', 0)">+1 WD</button>
                <button class="btn-secondary score-btn" onclick="addExtra('NB', 0)">+1 NB</button>
                <button class="btn-secondary score-btn" onclick="addExtra('NB', 1)">NB + 1</button>
                <button class="btn-secondary score-btn" onclick="addExtra('NB', 4)">NB + 4</button>
                <button class="btn-secondary score-btn" onclick="addExtra('BY', 0)">+1 BY</button>
                <button class="btn-secondary score-btn" onclick="addExtra('LB', 0)">+1 LB</button>
            </div>
        </div>
        <button id="innings-action-btn" class="btn-gold" style="margin-top: 5px;" onclick="endInnings()">End Innings</button>

        <div class="qr-broadcast-wrapper" id="admin-qr-box">
            <div class="qr-title"><i class="fa-solid fa-broadcast-tower"></i> SCAN FOR REAL LIVE SPECTATOR VIEW</div>
            <div id="qrcode-canvas"></div>
        </div>
    </div>

    <div id="result-screen" class="hidden">
        <h2 style="text-align: center; margin-bottom: 12px; font-family:'Montserrat';">🏆 MATCH CENTER</h2>
        <div class="scoreboard-panel" style="background: rgba(3, 192, 122, 0.08); margin-bottom:15px; border: 1px solid var(--accent-green);">
            <div style="font-size: 22px; font-weight: bold; color: var(--accent-gold);" id="winner-text">Finished</div>
        </div>
        
        <div id="final-summary" class="glass-card" style="line-height: 1.6; font-size: 13px; color: var(--text-white); max-height:260px; overflow-y:auto;"></div>

        <button class="btn-primary" style="background-color: #25d366; color: white; margin-bottom: 10px;" onclick="shareToWhatsApp()"><i class="fa-brands fa-whatsapp"></i> Share Full Analysis</button>
        <button class="btn-secondary" onclick="location.reload()">New Session</button>
    </div>
</div>

<script>
    // 📢 AUTOMATIC KEY DEPLOYMENT SUCCESSFUL
    const firebaseConfig = {
        apiKey: "AIzaSyDMTEI4feoXX3zJ06GCQvj",
        authDomain: "gully-cricket-add93.firebaseapp.com",
        databaseURL: "https://gully-cricket-add93-default-rtdb.firebaseio.com",
        projectId: "gully-cricket-add93",
        storageBucket: "gully-cricket-add93.appspot.com",
        messagingSenderId: "888354875623",
        appId: "1:888354875623:web:c062c2a6c"
    };
    
    firebase.initializeApp(firebaseConfig);
    let dbRef = firebase.database().ref("live_match");

    let mode = "team"; let currentOverHistory = []; let currentOverRunsSum = 0; let isMuted = false;
    let match = { maxOvers: 5, maxWickets: 10, currentInnings: 1, innings1: { batting: "", bowling: "", runs: 0, wickets: 0, balls: 0, wd: 0, nb: 0, by: 0, lb: 0, fours: 0, sixes: 0, squad: [], bowlingSquad: [], playerStats: {}, bowlerStats: {}, striker: "", nonStriker: "", activeBowler: "" }, innings2: { batting: "", bowling: "", runs: 0, wickets: 0, balls: 0, wd: 0, nb: 0, by: 0, lb: 0, fours: 0, sixes: 0, squad: [], bowlingSquad: [], playerStats: {}, bowlerStats: {}, striker: "", nonStriker: "", activeBowler: "" } };
    let cur = null; let isOperationalActive = true;

    function toggleMute() {
        isMuted = !isMuted;
        document.querySelector('#mute-icon i').className = isMuted ? "fa-solid fa-volume-xmark" : "fa-solid fa-volume-high";
        if(isMuted) window.speechSynthesis.cancel();
    }

    function speakCommentary(text) {
        if(isMuted) return;
        try { window.speechSynthesis.cancel(); let msg = new SpeechSynthesisUtterance(text); msg.rate = 1.15; window.speechSynthesis.speak(msg); } catch(e) {}
    }

    function executeCoinFlip() {
        let coinEl = document.getElementById('coin-element');
        let statusEl = document.getElementById('toss-live-status');
        let winnerDropdown = document.getElementById('toss-winner-select');
        let call = document.getElementById('coin-call-select').value;
        
        coinEl.classList.add('coin-spinning'); statusEl.innerText = "Spinning...";
        speakCommentary("Coin is flipping.");
        setTimeout(() => {
            coinEl.classList.remove('coin-spinning');
            let res = Math.random() < 0.5 ? "Heads" : "Tails";
            coinEl.innerText = res.toUpperCase();
            
            let nameA = (mode === "1v1") ? (document.getElementById('p1-name').value || "Player 1") : (document.getElementById('teamA-name').value || "CG");
            let nameB = (mode === "1v1") ? (document.getElementById('p2-name').value || "Player 2") : (document.getElementById('teamB-name').value || "BL");
            
            if (call === res) {
                statusEl.innerText = `${res}! You won the toss!`; winnerDropdown.value = "A";
                speakCommentary(`${res} it is. ${nameA} won the toss.`);
            } else {
                statusEl.innerText = `${res}! Opponent won the toss!`; winnerDropdown.value = "B";
                speakCommentary(`${res} it is. ${nameB} won the toss.`);
            }
        }, 1200);
    }

    function toggleMatchMode() { mode = document.getElementById('match-mode').value; document.getElementById('team-mode-fields').classList.toggle('hidden', mode === '1v1'); document.getElementById('one-on-one-fields').classList.toggle('hidden', mode === 'team'); }
    function processPlayers(text, defaultTeamName) { if (!text || !text.trim()) return Array.from({length: 4}, (_, i) => `${defaultTeamName} P${i+1}`); return text.split(',').map(name => name.trim()).filter(name => name.length > 0); }
    
    function startMatch() {
        mode = document.getElementById('match-mode').value;
        match.maxOvers = parseInt(document.getElementById('match-overs').value) || 5;
        match.currentInnings = 1; currentOverHistory = []; currentOverRunsSum = 0; isOperationalActive = true;
        
        let nameA = (mode === "1v1") ? (document.getElementById('p1-name').value || "Player 1") : (document.getElementById('teamA-name').value || "CG");
        let nameB = (mode === "1v1") ? (document.getElementById('p2-name').value || "Player 2") : (document.getElementById('teamB-name').value || "BL");
        
        let tossChoice = document.getElementById('toss-winner-select').value;
        let decision = document.getElementById('toss-decision').value;
        
        let batFirstTeam, bowlFirstTeam;
        if (tossChoice === "A") {
            if (decision === "Bat") { batFirstTeam = nameA; bowlFirstTeam = nameB; } else { batFirstTeam = nameB; bowlFirstTeam = nameA; }
        } else {
            if (decision === "Bat") { batFirstTeam = nameB; bowlFirstTeam = nameA; } else { batFirstTeam = nameA; bowlFirstTeam = nameB; }
        }

        let teamAPlayers = (mode !== "1v1") ? processPlayers(document.getElementById('teamA-players').value, nameA) : [nameA];
        let teamBPlayers = (mode !== "1v1") ? processPlayers(document.getElementById('teamB-players').value, nameB) : [nameB];

        match.innings1.batting = batFirstTeam; match.innings1.bowling = bowlFirstTeam;
        match.innings1.squad = (batFirstTeam === nameA) ? teamAPlayers : teamBPlayers;
        match.innings1.bowlingSquad = (bowlFirstTeam === nameA) ? teamAPlayers : teamBPlayers;

        match.innings2.batting = bowlFirstTeam; match.innings2.bowling = batFirstTeam;
        match.innings2.squad = match.innings1.bowlingSquad;
        match.innings2.bowlingSquad = match.innings1.squad;

        initInningsData(match.innings1); initInningsData(match.innings2);
        showOpenersScreen(); speakCommentary("Match starts.");
    }
    
    function initInningsData(innings) { 
        innings.runs = 0; innings.wickets = 0; innings.balls = 0; innings.wd = 0; innings.nb = 0; innings.by = 0; innings.lb = 0; innings.fours = 0; innings.sixes = 0; innings.playerStats = {}; innings.bowlerStats = {};
        innings.squad.forEach(p => { innings.playerStats[p] = { runs: 0, balls: 0, fours: 0, sixes: 0, out: false }; });
        innings.bowlingSquad.forEach(p => { innings.bowlerStats[p] = { balls: 0, runs: 0, wickets: 0, maidens: 0, currentOverRuns: 0 }; });
    }
    
    function showOpenersScreen() {
        cur = match.currentInnings === 1 ? match.innings1 : match.innings2;
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('match-screen').classList.add('hidden');
        document.getElementById('openers-screen').classList.remove('hidden');
        document.getElementById('openers-team-title').innerText = `${cur.batting.toUpperCase()} LINEUP CONFIGURATION`;
        
        let sStriker = document.getElementById('select-striker'); let sNonStriker = document.getElementById('select-non-striker'); let sBowler = document.getElementById('select-bowler');
        sStriker.innerHTML = ""; sNonStriker.innerHTML = ""; sBowler.innerHTML = "";
        
        cur.squad.forEach((player, index) => {
            sStriker.add(new Option(player, player)); sNonStriker.add(new Option(player, player));
            if(index === 1 && cur.squad.length > 1) sNonStriker.selectedIndex = 1;
        });
        cur.bowlingSquad.forEach(player => sBowler.add(new Option(player, player)));
    }
    
    function confirmOpeners() { 
        cur.striker = document.getElementById('select-striker').value; 
        cur.nonStriker = document.getElementById('select-non-striker').value; 
        cur.activeBowler = document.getElementById('select-bowler').value;
        if (cur.striker === cur.nonStriker && mode !== '1v1') { alert("Striker and Non-Striker cannot be duplicates!"); return; }
        document.getElementById('openers-screen').classList.add('hidden'); 
        document.getElementById('match-screen').classList.remove('hidden'); 
        setupInningsUI(); 
    }
    
    function setupInningsUI() {
        cur = match.currentInnings === 1 ? match.innings1 : match.innings2; match.maxWickets = mode === "1v1" ? 1 : cur.squad.length;
        document.getElementById('batting-team-display').innerText = `${cur.batting.toUpperCase()}`;
        
        setTimeout(broadcastLiveStateViaQR, 150);
        updateDashboard();
    }

    function updateDashboard() {
        document.getElementById('dsp-runs').innerText = cur.runs; 
        document.getElementById('dsp-wickets').innerText = cur.wickets;
        document.getElementById('dsp-overs').innerText = `${Math.floor(cur.balls/6)}.${cur.balls%6}`;
        
        let crr = cur.balls > 0 ? ((cur.runs / cur.balls) * 6).toFixed(2) : "0.00";
        document.getElementById('live-crr').innerText = crr;
        let totalRemainingBalls = (match.maxOvers * 6) - cur.balls;

        if (match.currentInnings === 2) {
            document.getElementById('live-rrr-hdr').classList.remove('hidden');
            let target = match.innings1.runs + 1;
            document.getElementById('live-target-val').innerText = target;
            let needed = target - cur.runs;
            
            if (needed <= 0) {
                document.getElementById('live-rrr').innerText = "0.00";
                document.getElementById('live-equation-banner').innerText = `${cur.batting.toUpperCase()} WON THE MATCH!`;
            } else {
                let rrr = totalRemainingBalls > 0 ? ((needed / totalRemainingBalls) * 6).toFixed(2) : "99.9";
                document.getElementById('live-rrr').innerText = rrr;
                document.getElementById('live-equation-banner').innerText = `${cur.batting.toUpperCase()} need ${needed} runs in ${totalRemainingBalls} balls`;
            }
        } else {
            document.getElementById('live-rrr-hdr').classList.add('hidden');
            document.getElementById('live-target-val').innerText = "-";
            document.getElementById('live-equation-banner').innerText = `1st Innings: ${cur.batting.toUpperCase()} Batting`;
        }

        renderTimelineRow(); renderBatsmenTable(); renderBowlerTable();
        
        // PUSH DYNAMICS LIVE TO CLOUD FOR SPECTATORS
        pushDataToFirebaseCloud();

        if (cur.balls >= (match.maxOvers * 6) || cur.wickets >= match.maxWickets) {
            document.querySelectorAll('.score-btn').forEach(btn => btn.classList.add('disabled'));
            isOperationalActive = false;
            if (match.currentInnings === 1) { endInnings(); } else { endMatch(); }
        }

        if (match.currentInnings === 2 && isOperationalActive) {
            let target = match.innings1.runs + 1;
            if (cur.runs >= target) {
                document.querySelectorAll('.score-btn').forEach(btn => btn.classList.add('disabled'));
                isOperationalActive = false; setTimeout(endMatch, 1000);
            }
        }
    }

    function renderTimelineRow() {
        let row = document.getElementById('timeline-balls-row'); row.innerHTML = "";
        currentOverHistory.forEach(item => {
            let circle = document.createElement('span'); circle.className = "ball-circle"; circle.innerText = item.val;
            if (item.type === 'W') circle.classList.add('wicket'); else if (item.type === 'B') circle.classList.add('boundary'); else if (item.type === 'E') circle.classList.add('extra');
            row.appendChild(circle);
        });
        document.getElementById('timeline-over-total').innerText = `= ${currentOverRunsSum}`;
    }

    function addRuns(amount) {
        if(!isOperationalActive || cur.balls >= (match.maxOvers * 6)) return;
        let counts = ["First ball", "Second ball", "Third ball", "Fourth ball", "Fifth ball", "Sixth ball"];
        let prefix = (counts[cur.balls % 6] || "Ball") + ". ";
        let voiceMsg = prefix + (amount === 0 ? "Dot ball." : `${amount} run${amount>1?'s':''}.`);

        cur.runs += amount; cur.balls += 1;
        if(cur.striker) { 
            cur.playerStats[cur.striker].runs += amount; cur.playerStats[cur.striker].balls += 1; 
            if(amount === 4) cur.playerStats[cur.striker].fours++;
            if(amount === 6) cur.playerStats[cur.striker].sixes++;
        }
        if(cur.activeBowler && cur.bowlerStats[cur.activeBowler]) { cur.bowlerStats[cur.activeBowler].balls += 1; cur.bowlerStats[cur.activeBowler].runs += amount; cur.bowlerStats[cur.activeBowler].currentOverRuns += amount; }

        if(amount === 4) cur.fours++; if(amount === 6) cur.sixes++;
        let bType = (amount === 4 || amount === 6) ? 'B' : 'N';
        currentOverHistory.push({ val: amount, type: bType }); currentOverRunsSum += amount;
        
        if (amount === 4 || amount === 6) { triggerBoundaryCelebration(amount, voiceMsg); } else { speakCommentary(voiceMsg); }
        if (mode !== "1v1") { if (amount === 1 || amount === 3) swapStrike(); if (cur.balls % 6 === 0) changeOverBowlerBlock(); }
        updateDashboard();
    }

    function swapStrike() { if (mode === "1v1" || !isOperationalActive) return; let temp = cur.striker; cur.striker = cur.nonStriker; cur.nonStriker = temp; renderBatsmenTable(); }
    
    function changeOverBowlerBlock() {
        if(!isOperationalActive) return;
        if(cur.bowlerStats[cur.activeBowler] && cur.bowlerStats[cur.activeBowler].currentOverRuns === 0) cur.bowlerStats[cur.activeBowler].maidens++;
        if(cur.bowlerStats[cur.activeBowler]) cur.bowlerStats[cur.activeBowler].currentOverRuns = 0;
        
        setTimeout(() => {
            currentOverHistory = []; currentOverRunsSum = 0; swapStrike();
            if(mode !== "1v1" && cur.balls < (match.maxOvers * 6)) {
                let remainingBowlers = cur.bowlingSquad.filter(p => p !== cur.activeBowler);
                let nextB = prompt(`Over Finished! Select next over bowler:\n${remainingBowlers.join(', ')}`);
                let validB = remainingBowlers.find(p => p.toLowerCase() === (nextB || "").trim().toLowerCase());
                cur.activeBowler = validB ? validB : remainingBowlers[0];
            }
            updateDashboard();
        }, 1000);
    }

    function takeWicketMenu() {
        if(!isOperationalActive || cur.balls >= (match.maxOvers * 6)) return;
        let voiceMsg = "Wicket down! Wicket! Wicket!"; speakCommentary(voiceMsg);

        cur.wickets += 1; cur.balls += 1;
        if(cur.striker) { cur.playerStats[cur.striker].balls += 1; cur.playerStats[cur.striker].out = true; }
        if(cur.activeBowler && cur.bowlerStats[cur.activeBowler]) { cur.bowlerStats[cur.activeBowler].balls += 1; cur.bowlerStats[cur.activeBowler].wickets++; }

        currentOverHistory.push({ val: 'W', type: 'W' });
        if (mode === "1v1") { updateDashboard(); return; }

        let remainingPlayers = cur.squad.filter(p => !cur.playerStats[p].out && p !== cur.nonStriker && p !== cur.striker);
        if (cur.wickets < match.maxWickets && remainingPlayers.length > 0) {
            let choice = prompt(`Wicket down! Enter next batsman lineup:\n${remainingPlayers.join(', ')}`);
            let validChoice = remainingPlayers.find(p => p.toLowerCase() === (choice || "").trim().toLowerCase());
            cur.striker = validChoice ? validChoice : remainingPlayers[0];
        } else { cur.striker = ""; }
        
        if (cur.balls % 6 === 0) changeOverBowlerBlock();
        updateDashboard();
    }

    function addExtra(type, structuralRuns) {
        if(!isOperationalActive) return;
        let voiceMsg = type === 'WD' ? "Wide ball!" : "No ball!"; speakCommentary(voiceMsg);
        
        if (type === 'WD') { 
            cur.wd += 1; cur.runs += 1; currentOverRunsSum += 1; currentOverHistory.push({ val: 'Wd', type: 'E' });
            if(cur.activeBowler && cur.bowlerStats[cur.activeBowler]) { cur.bowlerStats[cur.activeBowler].runs += 1; cur.bowlerStats[cur.activeBowler].currentOverRuns += 1; }
        } 
        else if (type === 'NB') { 
            cur.nb += 1; cur.runs += (1 + structuralRuns); currentOverRunsSum += (1 + structuralRuns); currentOverHistory.push({ val: 'Nb', type: 'E' });
            if(cur.activeBowler && cur.bowlerStats[cur.activeBowler]) { cur.bowlerStats[cur.activeBowler].runs += (1 + structuralRuns); cur.bowlerStats[cur.activeBowler].currentOverRuns += (1 + structuralRuns); }
            if(structuralRuns > 0 && cur.striker) { cur.playerStats[cur.striker].runs += structuralRuns; }
            if (structuralRuns === 4 || structuralRuns === 6) { cur.fours += (structuralRuns===4?1:0); cur.sixes += (structuralRuns===6?1:0); triggerBoundaryCelebration(structuralRuns, "Boundary boundary!"); }
        } 
        else {
            if(cur.balls >= (match.maxOvers * 6)) return;
            cur.balls += 1; cur.runs += 1; currentOverRunsSum += 1;
            if(cur.striker) cur.playerStats[cur.striker].balls += 1;
            if(cur.activeBowler) { var bElement = cur.bowlerStats[cur.activeBowler]; if(bElement) bElement.balls += 1; }
            if (type === 'BY') cur.by += 1; else cur.lb += 1;
            currentOverHistory.push({ val: type==='BY'?'By':'Lb', type: 'E' });
            if (mode !== "1v1" && cur.balls % 6 === 0) changeOverBowlerBlock();
        }
        updateDashboard();
    }

    function triggerBoundaryCelebration(val, comment) {
        let box = document.getElementById('boundary-alert');
        box.innerText = val === 4 ? "FOUR" : "SIX";
        box.className = `boundary-popup ${val === 4 ? 'four' : 'six'} show`;
        speakCommentary(comment);
        setTimeout(() => { box.classList.remove('show'); }, 1200);
    }

    function renderBatsmenTable() {
        let tbody = document.getElementById('batsmen-stats-body'); tbody.innerHTML = "";
        if (cur && cur.striker) { 
            let s = cur.playerStats[cur.striker]; let sr = s.balls > 0 ? ((s.runs / s.balls) * 100).toFixed(1) : "0.0"; 
            tbody.innerHTML += `<tr class="on-strike-row"><td>${cur.striker} *</td><td>${s.runs} (${s.balls})</td><td>${s.fours}</td><td>${s.sixes}</td><td>${sr}</td></tr>`; 
        }
        if (mode !== "1v1" && cur && cur.nonStriker) { 
            let ns = cur.playerStats[cur.nonStriker]; let sr = ns.balls > 0 ? ((ns.runs / ns.balls) * 100).toFixed(1) : "0.0"; 
            tbody.innerHTML += `<tr><td>${cur.nonStriker}</td><td>${ns.runs} (${ns.balls})</td><td>${ns.fours}</td><td>${ns.sixes}</td><td>${sr}</td></tr>`; 
        }
    }

    function renderBowlerTable() {
        let tbody = document.getElementById('bowler-stats-body'); tbody.innerHTML = "";
        if (cur && cur.activeBowler && cur.bowlerStats[cur.activeBowler]) {
            let b = cur.bowlerStats[cur.activeBowler]; let ov = `${Math.floor(b.balls/6)}.${b.balls%6}`;
            let econ = b.balls > 0 ? ((b.runs / b.balls) * 6).toFixed(2) : "0.00";
            tbody.innerHTML += `<tr><td>${cur.activeBowler}</td><td>${b.wickets}-${b.runs}</td><td>${ov}</td><td>${econ}</td></tr>`;
        }
    }

    function endInnings() { 
        if (match.currentInnings === 1) { 
            match.currentInnings = 2; isOperationalActive = true;
            document.querySelectorAll('.score-btn').forEach(btn => btn.classList.remove('disabled'));
            currentOverHistory = []; currentOverRunsSum = 0; 
            showOpenersScreen(); 
        } else { endMatch(); } 
    }
    
    function generateDeepScorecardString(inningsObj) {
        let data = `🏏 *${inningsObj.batting.toUpperCase()} BATTING CARD:*\n`;
        inningsObj.squad.forEach(p => {
            let b = inningsObj.playerStats[p];
            if(b && b.balls > 0) {
                let sr = ((b.runs / b.balls) * 100).toFixed(1);
                data += `  • ${p}: ${b.runs} runs (${b.balls}b) | 4s: ${b.fours} | 6s: ${b.sixes} | SR: ${sr}\n`;
            }
        });
        data += `\n🥎 *${inningsObj.bowling.toUpperCase()} BOWLING CARD:*\n`;
        inningsObj.bowlingSquad.forEach(p => {
            let b = inningsObj.bowlerStats[p];
            if(b && b.balls > 0) {
                let econ = ((b.runs / b.balls) * 6).toFixed(2);
                data += `  • ${p}: ${b.wickets}-${b.runs} (${Math.floor(b.balls/6)}.${b.balls%6} Ov) | Econ: ${econ}\n`;
            }
        });
        data += `⚠️ *Extras:* Wides: ${inningsObj.wd}, No-Balls: ${inningsObj.nb}, Byes: ${inningsObj.by}, LegByes: ${inningsObj.lb}\n`;
        return data;
    }

    function endMatch() {
        isOperationalActive = false; document.getElementById('match-screen').classList.add('hidden'); document.getElementById('result-screen').classList.remove('hidden');
        let target = match.innings1.runs + 1; let winner = ""; let summaryText = "";
        if (match.innings2.runs >= target) { winner = `${match.innings2.batting} Wins!`; summaryText = `${match.innings2.batting} successfully chased down the target of ${target} runs.`; } 
        else if (match.innings2.runs === match.innings1.runs) { winner = "Match Tied!"; summaryText = `Both sides finished equal with exactly ${match.innings1.runs} runs.`; } 
        else { winner = `${match.innings1.batting} Wins!`; let diff = match.innings1.runs - match.innings2.runs; summaryText = `${match.innings1.batting} defended their score successfully by ${diff} runs.`; }
        document.getElementById('winner-text').innerText = winner;
        
        let fullReview = `📊 *OVERALL MATCH BREAKDOWN:*\n🏆 *Winner:* ${winner}\n📝 _Summary: ${summaryText}_\n──────────────────────\n\n`;
        fullReview += `🔴 *1st INNINGS:* ${match.innings1.batting} - ${match.innings1.runs}/${match.innings1.wickets}\n`;
        fullReview += generateDeepScorecardString(match.innings1);
        fullReview += `──────────────────────\n\n`;
        fullReview += `🔵 *2nd INNINGS:* ${match.innings2.batting} - ${match.innings2.runs}/${match.innings2.wickets}\n`;
        fullReview += generateDeepScorecardString(match.innings2);
        
        document.getElementById('final-summary').innerText = fullReview;
        pushDataToFirebaseCloud(); 
    }

    function shareToWhatsApp() {
        let message = `🚀 *GULLY CRICKET PRO DEEP ANALYTICS* 🚀\n👨‍💻 *Scored By:* Abhiram\n──────────────────────\n${document.getElementById('final-summary').innerText}\n──────────────────────\n📱 _Scored via Gully Cricket Pro Engine_`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`, '_blank');
    }

    /* 📡 PUBLIC URL QR GENERATION SWITCH */
    function broadcastLiveStateViaQR() {
        let canvasContainer = document.getElementById("qrcode-canvas");
        if (!canvasContainer || typeof QRCode === "undefined") return;
        
        let liveBaseURL = window.location.href.split('?')[0];
        let broadcastString = liveBaseURL + "?view=spectator";
        canvasContainer.innerHTML = "";
        
        new QRCode(canvasContainer, {
            text: broadcastString,
            width: 160,
            height: 160,
            colorDark : "#111e36",
            colorLight : "#ffffff",
            correctLevel: QRCode.CorrectLevel.M
        });
    }

    /* ☁️ CLOUD SYNC METHOD */
    function pushDataToFirebaseCloud() {
        if(!dbRef) return;
        let packet = {
            i: match.currentInnings, o: match.maxOvers,
            t1: match.innings1.batting, r1: match.innings1.runs, w1: match.innings1.wickets, b1: match.innings1.balls,
            t2: match.innings2.batting, r2: match.innings2.runs, w2: match.innings2.wickets, b2: match.innings2.balls,
            st: cur ? cur.striker : '', ns: cur ? cur.nonStriker : '', bw: cur ? cur.activeBowler : '',
            f: cur ? cur.fours : 0, s: cur ? cur.sixes : 0, wd: cur ? cur.wd : 0, nb: cur ? cur.nb : 0, by: cur ? cur.by : 0, lb: cur ? cur.lb : 0
        };
        dbRef.set(packet);
    }

    /* 🛡 SPECTATOR DISPATCH ENGINE */
    function checkSpectatorURLBroadcast() {
        let params = new URLSearchParams(window.location.search);
        if (params.get('view') === 'spectator') {
            
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('openers-screen').classList.add('hidden');
            document.getElementById('interactive-button-deck').classList.add('hidden');
            document.getElementById('innings-action-btn').classList.add('hidden');
            document.getElementById('admin-qr-box').classList.add('hidden');
            document.getElementById('match-screen').classList.remove('hidden');
            
            isMuted = true;
            document.querySelector('#mute-icon i').className = "fa-solid fa-volume-xmark";

            dbRef.on("value", function(snapshot) {
                let data = snapshot.val();
                if(!data) return;

                document.getElementById('batting-team-display').innerText = (data.i === 1 ? data.t1 : data.t2).toUpperCase();
                document.getElementById('dsp-runs').innerText = data.i === 1 ? data.r1 : data.r2;
                document.getElementById('dsp-wickets').innerText = data.i === 1 ? data.w1 : data.w2;
                
                let bCount = data.i === 1 ? data.b1 : data.b2;
                document.getElementById('dsp-overs').innerText = `${Math.floor(bCount/6)}.${bCount%6}`;
                
                let runs = data.i === 1 ? data.r1 : data.r2;
                document.getElementById('live-crr').innerText = bCount > 0 ? ((runs / bCount) * 6).toFixed(2) : "0.00";

                if (data.i === 2) {
                    document.getElementById('live-rrr-hdr').classList.remove('hidden');
                    let target = data.r1 + 1; document.getElementById('live-target-val').innerText = target;
                    let remaining = (data.o * 6) - data.b2; let needed = target - data.r2;
                    if (needed <= 0) {
                        document.getElementById('live-rrr').innerText = "0.00";
                        document.getElementById('live-equation-banner').innerText = `${data.t2.toUpperCase()} WON THE MATCH!`;
                    } else {
                        document.getElementById('live-rrr').innerText = remaining > 0 ? ((needed / remaining) * 6).toFixed(2) : "99.9";
                        document.getElementById('live-equation-banner').innerText = `${data.t2.toUpperCase()} need ${needed} runs in ${remaining} balls`;
                    }
                } else {
                    document.getElementById('live-rrr-hdr').classList.add('hidden');
                    document.getElementById('live-target-val').innerText = "-";
                    document.getElementById('live-equation-banner').innerText = `1st Innings: ${data.t1.toUpperCase()} Batting`;
                }

                document.getElementById('batsmen-stats-body').innerHTML = `<tr><td class="on-strike-row">${data.st || 'Batter 1'} *</td><td>-</td><td>-</td><td>-</td><td>-</td></tr><tr><td>${data.ns || 'Batter 2'}</td><td>-</td><td>-</td><td>-</td><td>-</td></tr>`;
                document.getElementById('bowler-stats-body').innerHTML = `<tr><td>${data.bw || 'Bowler'}</td><td>-</td><td>-</td><td>-</td></tr>`;
                document.getElementById('timeline-balls-row').innerHTML = `<span style="font-size:11px; color:#03c07a; font-weight:bold;"><i class="fa-solid fa-signal"></i> Streaming Live Match Feed</span>`;
            });
        }
    }
    window.onload = checkSpectatorURLBroadcast;
</script>
